    <main class="formulario">
<h1 class="formulario_titulo"> Formulário de Cadastro </h1>
<div class="formulario_preencher"> 
<form action="GET">
    <label>Nome:</label><br>
    <input class="formulario_caixa" type="text" name="txtNome" size="50"
    title="Digite seu nome" maxlength="50"> <br><br>

    <label>Escolha sua senha:</label><br>
    <input class="formulario_caixa" type="password" name="txtSENHA" size="50"
    title="Digite sua Senha" maxlength="8"><br><br>

    <label>CPF:</label><br>
    <input class="formulario_caixa" type="txt" name="txtCPF" size="50"
    title="Digite seu CPF" maxlength="11"><br><br>

    <label>Data de Nascimento</label> <br>
    <input class="formulario_caixa" type="date" name="txtDATA" maxlength="50"> <br><br>

    <label>E-mail:</label><br>
    <input class="formulario_caixa" type="email" name="txtEmail" size="50"><br><br>

    <label>Endereço:</label><br>
    <input class="formulario_caixa" type="text" name="txtEndereco" size="50"><br><br>

    <label>Selecione a área de Interesse</label><br>
    <input class="formulario_caixa" type="checkbox" name="chkQuimica" value="org"> Orgânica
    <input class="formulario_caixa" type="checkbox" name="chkQuimica" value="an"> Analítica
    <input class="formulario_caixa" type="checkbox" name="chkQuimica" value="fq"> Físico-Química
    <input class="formulario_caixa" type="checkbox" name="chkQuimica" value="ger"> Geral
    <br><br>

    <label>Deseja receber novidades no e-mai? </label><br>
    <select  name="optSimenao">
        <option class="formulario_caixa2" value="Sim"> Sim </option>
        <option class="formulario_caixa2" value="Nao"> Não </option>
        </select><br><br>

    <label>Faça sua Sugestão:</label>    <br>
    <textarea class="formulario_caixa2" name="txtSUGESTAO" rows="10" cols="50"></textarea>    <br><br>

    <input class="formulario_caixa2" type="submit" value="Enviar">
    <input class="formulario_caixa2" type="reset" value="Limpar">
</form>   
</div>
