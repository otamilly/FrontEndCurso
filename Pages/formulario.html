    <main class="formulario">
<h1 class="formulario_titulo"> Formulário de Cadastro </h1>
<div class="formulario_preencher"> 
<form action="GET">
    <fieldset class="formulario__campo"> 
    <label>Nome:</label><br>
    <input class="formulario_caixa" required type="text" name="txtNome" size="50"
    title="Digite seu nome" maxlength="50" minlength="3"> <br><span class="mensagem-erro"></span> </fieldset>

    <fieldset class="formulario__campo"> 
    <label>Escolha sua senha:</label><br>
    <input class="formulario_caixa" required type="password" name="txtSENHA" size="50"
    title="Digite sua Senha" minlength="6"><br><span class="mensagem-erro"></span>
    </fieldset>

    <fieldset class="formulario__campo"> 
    <label>CPF:</label><br>
    <input class="formulario_caixa" required type="txt" name="txtCPF" id="txtCPF" size="50"
    title="Digite seu CPF" maxlength="11" minlength="11"><br><span class="mensagem-erro"></span>
    </fieldset>

    <fieldset class="formulario__campo"> 
    <label>Data de Nascimento</label> <br>
    <input class="formulario_caixa" required type="date" name="txtDATA" maxlength="50"> <br><span class="mensagem-erro"></span>
    </fieldset>
    
    <fieldset class="formulario__campo"> 
    <label>E-mail:</label><br>
    <input class="formulario_caixa" required type="email" name="txtEmail" size="50"><br><span class="mensagem-erro"></span>
    </fieldset>

    <fieldset class="formulario__campo"> 
    <label>Endereço:</label><br>
    <input class="formulario_caixa" required type="text" name="txtEndereco" size="50"><br><span class="mensagem-erro"></span>
    </fieldset>

    <fieldset class="formulario__campo"> 
    <label>Selecione a área de Interesse</label><br>
    <input class="caixa_check" required type="checkbox" name="chkQuimica" value="org"> Orgânica
    <input class="caixa_check" required type="checkbox" name="chkQuimica" value="an"> Analítica
    <input class="caixa_check" required type="checkbox" name="chkQuimica" value="fq"> Físico-Química
    <input class="caixa_check" required type="checkbox" name="chkQuimica" value="ger"> Geral
    <br><span class="mensagem-erro"></span>
    </fieldset>
    

    <fieldset class="formulario__campo"> 
    <label>Deseja receber novidades no e-mai? </label><br>
    <select class="formulario_caixa2" required name="optSimenao">
        <option class="formulario_caixa2" value="Sim"> Sim </option>
        <option class="formulario_caixa2" value="Nao"> Não </option>
        </select><br><span class="mensagem-erro"></span>
        </fieldset>

    <fieldset class="formulario__campo"> 
    <label>Faça sua Sugestão:</label>    <br>
    <textarea class="formulario_caixa2" name="txtSUGESTAO" rows="10" cols="50"></textarea>    <br><br>
    </fieldset>

    <input class="formulario_botao" type="submit" value="Enviar">
    <input class="formulario_botao" type="reset" value="Limpar">
    <span class="mensagem-erro"></span>
    
</form>   
</div>


 </main>
